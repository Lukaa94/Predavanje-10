<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zadatak 1 – Validacija forme</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Zadatak 1 – Validacija forme</h1>
    <!--
        ZADATAK:
        Napravite validaciju forme. Pritiskom na "Pošalji" JavaScript
        treba provjeriti svako polje i prikazati grešku ako nije ispravno.
        Ako su sva polja ispravna, prikazati poruku uspjeha.
    -->

    <form id="forma" novalidate>

        <div class="polje">
            <label for="ime">Ime:</label>
            <input type="text" id="ime" placeholder="Unesite ime">
            <span id="greska-ime"></span>
        </div>

        <div class="polje">
            <label for="email">Email:</label>
            <input type="text" id="email" placeholder="Unesite email">
            <span id="greska-email"></span>
        </div>

        <div class="polje">
            <label for="lozinka">Lozinka:</label>
            <input type="password" id="lozinka" placeholder="Minimalno 6 znakova">
            <span id="greska-lozinka"></span>
        </div>

        <button type="submit">Pošalji</button>
    </form>

    <p id="poruka-uspjeha"></p>

    <script src="script.js"></script>
</body>
</html>
