<!doctype html>
<html lang="hr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zadatak 2 Kalkulator</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <h1>Zadatak 2 Kalkulator</h1>

    <div class="kalkulator">
      <div class="inputi">
        <input id="broj1" placeholder="Prvi broj" />
        <span id="operacija"></span>
        <input id="broj2" placeholder="Drugi broj" />
      </div>

      <div class="gumbi">
        <!-- TODO: Dodajte event listener na svaki gumb u script.js -->
        <button id="zbrajanje">+ Zbroji</button>
        <button id="oduzimanje">− Oduzmi</button>
        <button id="mnozenje">× Pomnoži</button>
        <button id="djeljenje">÷ Podijeli</button>
      </div>

      <!-- Ovdje se prikazuje rezultat -->
      <div id="rezultat" class="rezultat"></div>
    </div>
  </body>
</html>
