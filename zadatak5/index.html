<!--
    ZADATAK 5 – XHTML 1.0 Strict
    
    XHTML PRAVILA koja morate poštovati:
    ✔ DOCTYPE deklaracija je obavezna (već dodana gore)
    ✔ Svi tagovi moraju biti zatvoreni: <br /> <img /> <input />
    ✔ Svi nazivi tagova i atributa MORAJU biti malim slovima: <div>, ne <DIV>
    ✔ Vrijednosti atributa MORAJU biti u navodnicima: href="link.html"
    ✔ Atribut 'alt' je obavezan za sve <img /> elemente
    ✔ Atributi se ne smiju skraćivati: checked="checked" (ne samo checked)
    ✔ Elementi se moraju ispravno ugniježditi: <b><i>tekst</i></b> (ispravno)
    ✗ Pogrešno: <b><i>tekst</b></i>
    
    ZADATAK:
    Dovršite ovu XHTML stranicu s traženim elementima.
    Nakon što završite, provjerite valjanost na: https://validator.w3.org/
-->
